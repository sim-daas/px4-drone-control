# Simulation container tmuxinator config
name: sim
root: /root

windows:
  - Micro_XRCE_Agent:
      root: /root/Micro-XRCE-DDS-Agent
      layout: even-vertical
      panes:
        - MicroXRCEAgent udp4 -p 8888

  - PX4:
      root: /root/PX4-Autopilot
      layout: even-vertical
      panes:
        - PX4_SYS_AUTOSTART=4002 PX4_GZ_MODEL_POSE="268.08,-128.22,3.86,0.00,0,-0.7" PX4_SIM_MODEL=gz_x500 ./build/px4_sitl_default/bin/px4

  - ROS2_Controller:
      root: /root/ros2_ws
      layout: even-vertical
      panes:
        - source install/setup.bash && echo "Ready to run ROS 2 controller here."
