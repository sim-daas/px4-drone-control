networks:
  drone-sim-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.42.0.0/16

services:
  simulation:
    build:
      context: ..
      dockerfile: docker/Dockerfile.simulation
    container_name: drone-simulation
    privileged: true
    network_mode: host 
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - NVIDIA_DRIVER_CAPABILITIES=all
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /dev/dri:/dev/dri
      - ../controller:/root/ros2_ws/src/controller
      - ../px4_msgs:/root/ros2_ws/src/px4_msgs
      - ../px4_ros_com:/root/ros2_ws/src/px4_ros_com
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    stdin_open: true
    tty: true
